<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Books Keera</title>
    <link rel="stylesheet" href="style.css" />

    <!-- GOOGLE FONT LINKS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Work+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header" data-header>
      <div class="header-top">
        <div class="container">
          <a href="#" class="logo">
            <img src="./assets/Logo.png" alt="logo" width="138" height="28" />
          </a>

          <div class="input-wrapper">
            <input
              type="search"
              name="search"
              placeholder="Search for books..."
              class="input-field"
            />
            <button class="btn btn-primary">Search</button>

            <div class="header-action">
              <button class="header-action-btn" aria-label="cart" title="Cart">
                <span class="span">0</span>

                <ion-icon
                  name="bag-handle-outline"
                  aria-hidden="true"
                ></ion-icon>
              </button>
              <!-- Sperator -->
              <button
                class="header-action-btn"
                aria-label="open menu"
                title="Open Menu"
                data-nav-toggler
              >
                <ion-icon name="menu-outline" aria-hidden="true"></ion-icon>
              </button>
              <!-- Sperator -->
              <button
                class="header-action-btn"
                aria-label="user"
                title="User"
                data-nav-toggler
              >
                <ion-icon name="person-outline" aria-hidden="true"></ion-icon>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="header-bottom" data-navbar>
        <div class="container">
          <nav class="navbar">
            <button
              class="nav-close-btn"
              aria-label="close menu"
              title="Close Menu"
              data-nav-toggler
            >
              <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
            </button>

            <div class="navbar-top">
              <input
                type="search"
                name="search"
                placeholder="Search for books..."
                class="input-field"
              />

              <button class="search-btn" aria-label="Search">
                <ion-icon name="search-outline" aria-hidden="true"></ion-icon>
              </button>
            </div>

            <ul class="navbar-list">
              <li>
                <a href="#" class="navbar-link">Home</a>
                <a href="#" class="navbar-link">About</a>
                <a href="#" class="navbar-link">Contact</a>
                <a href="#" class="navbar-link">Books</a>
                <a href="#" class="navbar-link">Blog</a>
              </li>
            </ul>

            <a href="tel:+923339229099" class="header-contact-link">
              <ion-icon name="call-outline" aria-hidden="true"></ion-icon>
              <span class="span">+92 333 922 9099</span></a
            >
          </nav>
        </div>
      </div>

      <div class="overlay"></div>
    </header>

    
    <!-- Icons: IonIcons -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
